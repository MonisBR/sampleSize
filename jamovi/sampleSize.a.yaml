name: sampleSize
#title: Sample Size
title: Sample Size Calculator
version: '1.0.0'

jas: '1.2'

menuGroup: Exploration
#menuTitle: Sample Size for independent samples
menuTitle: Sample Size Calculator

options:

  - name: tipo
    #title: Tipo
    title: Analysis type
    type: List
    #Dejar los nombres de las variables porque está relacionado con el archivo b.r pero poner etiquetas
    #media -> One Mean; proporcion -> One Proportion; dosMediasVD -> Two independent means different variances; 
    #dosMediasVC -> Two independent means common variances -> Two Independent Proportions
    #options: 
     # - media
     # - proporcion 
     # - dosMediasVD 
     # - dosMediasVC 
     # - dosProporciones
    #default: media
    
    options: 
     - name: media
       title: One-sample mean

     - name: proporcion
       title: One-sample proportion 

     - name: dosMediasVD
       title: Two independent means (different variances)
     
     - name: dosMediasVC
       title: Two independent means (common variances)

     - name: dosProporciones
       title: Two independent proportions

    default: media
    
#UNA MEDIA - e, S, NC    
  - name: e_OM
    #title: Precisión para 1 media
    title: Precision
    type: Number
    default: 1
    
  - name: S
    #title: Desviación estándar
    title: Standard deviation
    type: Number
    default: 1

  - name: level_OM
    #title: Nivel de confianza para 1 media
    title: Confidence level
    type: Number
    default: 0.95
    min: 0.0001
    max: 0.9999

#UNA PROPORCIÓN - e, P, NC
  - name: e_OP
    #title: Precisión para 1 proporción
    title: Precision
    type: Number
    default: 0.05
    min: 0.0001
    max: 0.9999

  - name: P
    #title: Proporción esperada
    title: Expected proportion
    type: Number
    default: 0.5
    min: 0.0001
    max: 1

  - name: level_OP
    #title: Nivel de confianza para 1 proporción
    title: Confidence level
    type: Number
    default: 0.95
    min: 0.0001
    max: 0.9999

#INDEPENDEN PROPORTIONS - NC, potencia, diferencia, P1, P2
  - name: pow_IP
    #title: Potencia 2 proporciones
    title: Statistical power
    type: Number
    default: 0.85
    min: 0.0001
    max: 1
  
  - name: level_IP
    #title: Nivel de confianza para 2 proporciones
    title: Confidence level
    type: Number
    default: 0.95
    min: 0.0001
    max: 0.9999

  - name: dif_IP
    #title: Diferencia mínima detectable entre 2 proporciones
    title: Minimum detectable difference
    type: Number
    default: 0.05
    min: 0.0001
    max: 0.9999

  - name: P1
    #title: Proporción esperada población 1
    title: Expected proportion in group 1
    type: Number
    default: 0.5
    min: 0.0001
    max: 1

  - name: P2
    #title: Proporción esperada población 2
    title: Expected proportion in group 2
    type: Number
    default: 0.6
    min: 0.0001
    max: 1

#INDEPENDENT MEANS - NC, potencia, diferencia, S1, S2
  - name: level_IM
    #title: Nivel de confianza para 2 medias independientes
    title: Confidence level
    type: Number
    default: 0.95
    min: 0.0001
    max: 0.9999

  - name: pow_IM
    #title: Potencia 2 medias independientes
    title: Statistical power
    type: Number
    default: 0.85
    min: 0.0001
    max: 0.9999

  - name: dif_IM
    #title: Diferencia mínima detectable entre 2 medias independientes
    title: Minimum detectable difference
    type: Number
    default: 1

  - name: S1
    #title: Desviación estándar población 1
    title: Group 1 standard deviation
    type: Number
    default: 1

  - name: S2
    #title: Desviación estándar población 2
    title: Group 2 standard deviation
    type: Number
    default: 1

#INDEPENDENT MEANS - NC, potencia, diferencia, SC
  - name: level_PM
    #title: Nivel de confianza para 2 medias varianza común
    title: Confidence level
    type: Number
    default: 0.95
    min: 0.0001
    max: 0.9999

  - name: pow_PM
    #title: Potencia 2 medias varianza común
    title: Statistical power
    type: Number
    default: 0.85
    min: 0.0001
    max: 0.9999
    
  - name: dif_PM
    #title: Diferencia mínima detectable entre 2 medias varianza común
    title: Minimum detectable difference
    type: Number
    default: 1

  - name: SC
    #title: Desviación estándar común
    title: Common standard deviation
    type: Number
    default: 1
